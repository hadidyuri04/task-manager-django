<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .task-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .table { border: 1px solid #dee2e6; }
    </style>
</head>
<body>

<div class="container">
    <div class="task-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="text-primary fw-bold">Task List</h1>
            <a href="{% url 'task_create' %}" class="btn btn-primary shadow-sm">+ Add New Task</a>
        </div>

        <div class="table-responsive">
            <table class="table table-hover table-bordered align-middle">
                <thead class="table-dark">
                    <tr>
                        <th style="width: 40%;">Title</th>
                        <th>Status</th>
                        <th>Due Date</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    {% for task in tasks %}
                    <tr>
                        <td class="fw-semibold">{{ task.title }}</td>
                        <td>
                            <span class="badge rounded-pill bg-info text-dark">
                                {{ task.get_status_display }}
                            </span>
                        </td>
                        <td class="text-muted">{{ task.due_date|date:"M d, Y" }}</td>
                        <td class="text-center">
                            <div class="btn-group" role="group">
                                <a href="{% url 'task_complete' task.pk %}" class="btn btn-sm btn-outline-success">Done</a>
                                <a href="{% url 'task_delete' task.pk %}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure?')">Delete</a>
                            </div>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" class="text-center py-4 text-muted italic">
                            No tasks found. Click "Add New Task" to start!
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
