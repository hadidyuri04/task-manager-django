<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks</title>
</head>
<body>
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Task List</h1>
        <a href="{% url 'task_create' %}" class="btn btn-primary"> Add new Task</a>
    </div>
    <table class="table table-hover">
    <thead class="table-dark">
        <tr>
            <th>Title</th>
            <th>Status</th>
            <th>Due Date</th>
            <th>Actions</th> </tr>
    </thead>
    <tbody>
        {% for task in tasks %}
        <tr>
            <td>{{ task.title }}</td>
            <td><span class="badge bg-info">{{ task.get_status_display }}</span></td>
            <td>{{ task.due_date }}</td>
            <td>
                <a href="{% url 'task_complete' task.pk %}" class="btn btn-sm btn-success">Done</a>
                <a href="{% url 'task_delete' task.pk %}" class="btn btn-sm btn-danger" onclick="return confirm('Are you sure?')">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" class="text-center">No tasks found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
    
</body>
</html>
